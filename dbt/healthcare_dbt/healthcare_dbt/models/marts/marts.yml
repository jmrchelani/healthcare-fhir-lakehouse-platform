version: 2

models:
  - name: patient_summary
    columns:
      - name: patient_id
        tests:
          - not_null
          - unique

  - name: provider_utilization
    columns:
      - name: provider_id
        tests:
          - not_null
          - unique

      - name: total_encounters
        tests:
          - not_null

      - name: total_patients_served
        tests:
          - not_null